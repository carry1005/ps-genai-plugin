<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="subrow">
          <h1>AI修图插件byCarry</h1>
          <div class="header-btns">
            <button id="paramsBtn" class="icon-btn" title="生成参数">🎛</button>
            <button id="settingsBtn" class="icon-btn" title="模型与密钥设置">⚙</button>
          </div>
        </div>
      </div>

      <div id="settingsOverlay" class="modal-overlay hidden">
        <div class="modal-box">
          <div class="modal-head">
            <span class="modal-title">设置</span>
            <button id="settingsClose" class="icon-btn" title="关闭">✕</button>
          </div>
          <div id="settingsArea">
      <div class="section">
        <p class="sec-title">模型</p>
        <select id="modelPicker" class="full"></select>
        <p class="hint" id="modelHint"></p>
      </div>

      <div class="section">
        <p class="sec-title">API 密钥</p>
        <input id="apiKey" type="password" class="full" placeholder="粘贴该模型的 API Key" />
        <div class="row-between">
          <label class="inline"><input type="checkbox" id="showKey" /> 显示</label>
          <span class="badge" id="keyBadge">未保存</span>
        </div>
        <div class="row">
          <button id="saveKey" class="btn grow">保存密钥</button>
          <button id="clearKey" class="btn ghost">清除</button>
        </div>
      </div>
          </div><!-- /settingsArea -->
        </div>
      </div><!-- /settingsOverlay -->

      <div id="paramsOverlay" class="modal-overlay hidden">
        <div class="modal-box">
          <div class="modal-head">
            <span class="modal-title">生成参数</span>
            <button id="paramsClose" class="icon-btn" title="关闭">✕</button>
          </div>
          <div class="section">
            <p class="sec-title">参数</p>
            <div id="paramContainer"></div>
            <label class="lbl">上传最长边(像素, 0=原始)</label>
            <input id="maxEdge" type="number" value="2048" class="full" />
            <div class="hidden">
              <label class="inline"><input type="checkbox" id="fallbackFull" checked /> 无选区时用整张画布</label>
              <input id="layerPrefix" type="text" value="AI" />
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <p class="sec-title">提示词</p>
        <textarea id="prompt" class="full" rows="6" placeholder="点这里弹出输入框填写。例如：把外套改成红色皮夹克，保留人物姿态"></textarea>
        <p class="hint">点输入框即可弹出输入对话框；也可直接粘贴</p>
        <label class="lbl" style="margin-top:6px">负向提示词（可选）</label>
        <textarea id="negPrompt" class="full" rows="2" placeholder="点这里填写不想要的元素，例如：模糊、多余的手指、文字水印"></textarea>
        <div class="row-between" style="margin-top:6px">
          <button id="addRef" class="btn ghost">➕ 添加参考图</button>
          <span class="hint" id="refInfo">无参考图</span>
          <button id="clearRef" class="btn ghost hidden">清空</button>
        </div>
        <div id="refThumbs" class="ref-thumbs"></div>
      </div>

      <div class="section">
        <div class="progress" id="progress"><div class="bar"></div></div>
        <div class="status" id="status">初始化中…</div>
        <div class="row">
          <button id="generate" class="btn cta grow">生成</button>
          <button id="cancel" class="btn ghost hidden">取消</button>
        </div>
        <p class="hint" id="selInfo"></p>
      </div>
    </div>

    <script src="lib/CSInterface.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/models.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
